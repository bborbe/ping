version: "2"

linters:
  default: none
  enable:
    - asasalint
    - bidichk
    - bodyclose
    - canonicalheader
    - copyloopvar
    - cyclop
    - depguard
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - errorlint
    - exhaustive
    - fatcontext
    - funlen
    - gocheckcompilerdirectives
    - gochecksumtype
    - gocognit
    - gocritic
    - gocyclo
    - godot
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - govet
    - grouper
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - lll
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - nlreturn
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - perfsprint
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wsl_v5
    - zerologlint

  settings:
    cyclop:
      max-complexity: 20
    depguard:
      rules:
        main:
          deny:
            - pkg: "github.com/pkg/errors"
              desc: "use github.com/bborbe/errors instead"
            - pkg: "github.com/bborbe/argument$"
              desc: "use github.com/bborbe/argument/v2 instead"
            - pkg: "golang.org/x/net/context"
              desc: "use stdlib context instead"
            - pkg: "golang.org/x/lint/golint"
              desc: "use revive or staticcheck instead"
            - pkg: "io/ioutil"
              desc: "use io and os packages instead"
    errcheck:
      exclude-functions:
        - (net.Conn).Close
        - (io.Closer).Close
        - (*net.IPConn).Close
    funlen:
      lines: 80
      statements: 80
    gocognit:
      min-complexity: 20
    gomoddirectives:
      replace-allow-list:
        - k8s.io/kube-openapi
    lll:
      line-length: 100
    maintidx:
      under: 20
    mnd:
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "8"
        - "16"
        - "1000"
        - "0xFFFF"
        - "0x1234"
        - "1024"
    nestif:
      min-complexity: 4
    varnamelen:
      min-name-length: 2
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithStack(

  exclusions:
    rules:
      - path: "_test.go"
        linters:
          - funlen
          - gocognit
          - maintidx
          - wrapcheck
          - nonamedreturns
          - varnamelen
      - path: "_test.go"
        linters:
          - revive
        text: "dot-imports"

